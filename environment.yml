name: hsm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - pip
  - numpy
  - matplotlib
  - pyyaml
  - pyrender
  - natsort
  - omegaconf

  # For GPT
  - openai
  - python-dotenv

  # For Trimesh
  - trimesh=4
  - scipy
  - pillow
  - rtree
  - shapely

  # For CLIP
  - pytorch
  - torchvision
  # - pytorch-cuda=12.1
  - regex
  - tqdm
  - open-clip-torch

  - pip:
    - huggingface-hub

    # For trimesh collision detection and raycasting
    - python-fcl
    - manifold3d
    # - embreex  # Uncomment for faster trimesh raycasting on x86_64 platforms

    - earcut
    - compress_json

    # Headless Blender rendering layer (render.py). bpy 5.1.2 co-installs with
    # torch in this same env, so generation + rendering both run here (no separate
    # render env). Equivalent to the project's [render] extra.
    - bpy==5.1.2

    - pytest
